<!DOCTYPE html>
<html>
<head>
    <title>AI Internship Screening System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 6px 0 15px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Internship Screening</h2>

    <form action="/predict" method="post">
        <label>CGPA</label>
        <input type="number" step="0.1" name="cgpa" required>

        <label>Projects</label>
        <input type="number" name="projects" required>

        <label>Certifications</label>
        <input type="number" name="certifications" required>

        <label>Internship Experience (0 or 1)</label>
        <input type="number" name="internship_exp" required>

        <label>Communication (1-5)</label>
        <input type="number" name="communication" required>

        <button type="submit">Predict</button>
    </form>

    <div class="result">
        {{ prediction_text }}
    </div>
</div>

</body>
</html>
